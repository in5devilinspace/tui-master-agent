# CI workflow, staged here instead of .github/workflows/ because the token used
# in the build sprint lacked the GitHub `workflow` OAuth scope. To enable:
#
#   mkdir -p .github/workflows && git mv ci/ci.yml .github/workflows/ci.yml
#   git commit -m "ci: enable lint+type+test matrix"
#   git push   # with a token that has the `workflow` scope, or via SSH
#
# Runs clean locally today: `ruff check . && mypy tui_master.py tests && pytest -q`

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: uv pip install --system -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy tui_master.py tests
      - name: Pytest
        run: pytest -q
